<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
<title id="title">Strategy selection algorithm</title>
<desc id="desc">Flow diagram for choosing the best available solving strategy.</desc>
<style>
  text{font-family:Arial,Helvetica,sans-serif;fill:#17212f}.box{fill:#fff;stroke:#b8c2cf;stroke-width:2;rx:16}.decision{fill:#eef4ff;stroke:#2d6cdf;stroke-width:2}.arrow{stroke:#2d6cdf;stroke-width:3;fill:none;marker-end:url(#m)}.label{font-size:17px;font-weight:700}.small{font-size:13px;fill:#687386}
</style>
<defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2d6cdf"/></marker></defs>
<rect width="980" height="360" fill="#f6f7f9"/>
<rect class="box" x="40" y="40" width="180" height="80"/>
<text class="label" x="130" y="74" text-anchor="middle">Classify task</text><text class="small" x="130" y="98" text-anchor="middle">equation, log, rational…</text>
<rect class="box" x="290" y="40" width="180" height="80"/>
<text class="label" x="380" y="72" text-anchor="middle">Detect actions</text><text class="small" x="380" y="98" text-anchor="middle">solve, factor, domain…</text>
<rect class="decision" x="540" y="30" width="200" height="100"/>
<text class="label" x="640" y="68" text-anchor="middle">Score candidates</text><text class="small" x="640" y="94" text-anchor="middle">specific rules beat generic</text>
<rect class="box" x="800" y="40" width="140" height="80"/>
<text class="label" x="870" y="72" text-anchor="middle">Run best</text><text class="small" x="870" y="98" text-anchor="middle">native first</text>
<path class="arrow" d="M225 80 H285"/><path class="arrow" d="M475 80 H535"/><path class="arrow" d="M745 80 H795"/>
<rect class="box" x="130" y="210" width="190" height="80"/>
<text class="label" x="225" y="243" text-anchor="middle">Validate steps</text><text class="small" x="225" y="267" text-anchor="middle">before → after must change</text>
<rect class="box" x="395" y="210" width="190" height="80"/>
<text class="label" x="490" y="243" text-anchor="middle">Verify answer</text><text class="small" x="490" y="267" text-anchor="middle">substitution / rule checks</text>
<rect class="box" x="660" y="210" width="190" height="80"/>
<text class="label" x="755" y="243" text-anchor="middle">Render trace</text><text class="small" x="755" y="267" text-anchor="middle">student-readable cards</text>
<path class="arrow" d="M870 125 C870 175 225 160 225 205"/><path class="arrow" d="M325 250 H390"/><path class="arrow" d="M590 250 H655"/>
</svg>
